allowBuilds:
    sharp: true
    simple-git-hooks@2.13.1: true
    unrs-resolver: true

configDependencies:
    "@obusk/pnpm-plugin-defaults": 0.6.0

minimumReleaseAgeExclude:
    - "@next/*"
    - next
    - react
    - react-dom
    - eslint-config-next
    - "@obusk/eslint-config-next"

overrides:
    "@types/react": 19.2.14
    "@types/react-dom": 19.2.3
    postcss@<8.5.10: ^8.5.10
    sharp@<0.35.0: ^0.35.0

trustPolicyExclude:
    - semver@6.3.1
    - tailwind-merge@2.6.1
    - eslint-import-resolver-typescript@3.10.1
